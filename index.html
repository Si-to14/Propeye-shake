<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ole Protein — Plan Financiero</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#252525;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0ece4;--muted:#888;--dim:#555;
  --accent:#c8f065;--accent2:#65d4f0;--red:#f06565;--amber:#f0b865;--blue:#658ff0;--purple:#b06af0;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --r:12px;--r-lg:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;}

/* HEADER */
.header{padding:18px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);gap:12px;flex-wrap:wrap;}
.logo{font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block;}
.tagline{font-size:11px;color:var(--muted);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.lang-toggle{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.lang-btn{background:transparent;border:none;padding:5px 14px;font-size:11px;font-weight:700;font-family:var(--font-head);cursor:pointer;color:var(--muted);letter-spacing:0.5px;transition:all 0.15s;}
.lang-btn.active{background:var(--accent);color:#000;}
.lang-btn:hover:not(.active){color:var(--text);}

/* NAV */
.nav-tabs{display:flex;gap:2px;padding:0 32px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:13px 18px;font-family:var(--font-head);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color 0.2s;letter-spacing:0.3px;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* PAGES */
.page{display:none;padding:28px 32px;max-width:1140px;margin:0 auto;}
.page.active{display:block;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;}
.card-inner{background:var(--surface2);border-radius:var(--r);padding:16px 18px;}

/* GRID */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}

@media(max-width:800px){
  .grid-3,.grid-2{grid-template-columns:1fr;}
  .grid-4,.grid-5{grid-template-columns:repeat(2,1fr);}
  .page{padding:18px 16px;}
  .header{padding:14px 16px;}
  .nav-tabs{padding:0 16px;}
}

/* TYPOGRAPHY */
.section-label{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.section-title{font-family:var(--font-head);font-size:19px;font-weight:700;margin-bottom:18px;}
.section-gap{margin-top:32px;}
h4{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px;}

/* METRIC CARDS */
.metric-card{background:var(--surface2);border-radius:var(--r);padding:16px 18px;}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:5px;}
.metric-value{font-family:var(--font-head);font-size:26px;font-weight:700;line-height:1;}
.metric-sub{font-size:10px;color:var(--dim);margin-top:5px;}

/* SCENARIO CARDS */
.scenario-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;position:relative;overflow:hidden;}
.scenario-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.scenario-card.pess::before{background:var(--red);}
.scenario-card.neut::before{background:var(--blue);}
.scenario-card.opti::before{background:var(--accent);}
.scenario-card.featured{border-color:var(--blue);}
.scenario-name{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.scenario-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.sc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sc-row:last-child{border-bottom:none;}
.sc-lbl{color:var(--muted);}
.sc-val{font-weight:500;}
.sc-total{display:flex;justify-content:space-between;padding:10px 0 3px;}
.sc-total .sc-lbl{font-weight:600;color:var(--text);font-size:14px;}
.sc-total .sc-val{font-family:var(--font-head);font-size:20px;font-weight:700;}
.sc-divider{border:none;border-top:1px solid var(--border2);margin:6px 0;}

/* CHART */
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;margin-bottom:14px;}
.chart-title{font-family:var(--font-head);font-size:12px;font-weight:600;color:var(--muted);margin-bottom:14px;letter-spacing:0.5px;text-transform:uppercase;}
.chart-wrap{position:relative;width:100%;}

/* FIN CARDS */
.fin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;}
.fin-card.recommended{border-color:var(--accent);background:#111a0a;}
.fin-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:var(--accent);color:#000;margin-bottom:10px;}
.fin-name{font-family:var(--font-head);font-size:14px;font-weight:700;margin-bottom:3px;}
.fin-price{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--accent);margin:6px 0 2px;line-height:1;}
.fin-price-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.fin-list{list-style:none;}
.fin-list li{font-size:12px;color:var(--muted);padding:4px 0;display:flex;gap:7px;}
.fin-list li::before{content:'–';color:var(--dim);flex-shrink:0;}
.fin-list li.pro{color:var(--text);}
.fin-list li.pro::before{content:'✓';color:var(--accent);}

/* TABLES */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{text-align:left;color:var(--dim);font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;padding:0 8px 8px 0;border-bottom:1px solid var(--border);}
.data-table th.r{text-align:right;}
.data-table td{padding:9px 8px 9px 0;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.cell-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 9px;font-size:13px;color:var(--text);font-family:var(--font-body);width:78px;text-align:right;transition:border-color 0.2s;}
.cell-input:focus{outline:none;border-color:var(--accent);}
.cell-input.wide{width:150px;text-align:left;}
.cell-input.free{width:86px;}
select.cell-input{width:58px;cursor:pointer;text-align:center;padding:5px 3px;}
select.cell-input option{background:var(--surface2);}
.cell-ref{font-size:10px;color:var(--dim);margin-top:2px;}
.cell-unit{font-size:10px;color:var(--dim);text-align:right;margin-top:2px;}
.del-btn{background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--dim);font-size:13px;padding:3px 7px;transition:all 0.15s;}
.del-btn:hover{border-color:var(--red);color:var(--red);}
.add-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--muted);font-family:var(--font-body);margin-top:10px;transition:all 0.15s;display:inline-block;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* SLIDERS */
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.slider-row label{font-size:12px;color:var(--muted);min-width:210px;}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer;}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);}
.slider-out{font-family:var(--font-head);font-size:13px;font-weight:600;min-width:68px;text-align:right;color:var(--accent);}

/* COST TOTAL */
.cost-total-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border2);}
.cost-total-label{font-size:12px;color:var(--muted);}
.cost-desglose{font-size:10px;color:var(--dim);margin-top:2px;}
.cost-total-val{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--accent);}
.cost-pct{font-size:10px;color:var(--dim);text-align:right;margin-top:2px;}

/* WARN */
.warn{border-radius:var(--r);padding:11px 14px;font-size:12px;margin-top:10px;display:none;}
.warn-red{background:rgba(240,101,101,0.1);border:1px solid rgba(240,101,101,0.3);color:var(--red);}
.warn-amber{background:rgba(240,184,101,0.1);border:1px solid rgba(240,184,101,0.3);color:var(--amber);}
.note{font-size:11px;color:var(--dim);margin-top:10px;padding-left:11px;border-left:2px solid var(--border2);line-height:1.7;}

/* HERO */
.hero-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;}
.hero-title{font-family:var(--font-head);font-size:26px;font-weight:800;line-height:1.1;}
.hero-title span{color:var(--accent);}
.hero-desc{font-size:12px;color:var(--muted);margin-top:5px;max-width:400px;line-height:1.6;}
.hero-badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.hbadge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.hbadge.green{background:rgba(200,240,101,0.1);color:var(--accent);border-color:rgba(200,240,101,0.25);}
.hbadge.blue{background:rgba(101,143,240,0.1);color:var(--blue);border-color:rgba(101,143,240,0.25);}

/* MARKET NOTE */
.market-note{background:rgba(101,212,240,0.07);border:1px solid rgba(101,212,240,0.2);border-radius:var(--r);padding:11px 14px;font-size:11px;color:var(--muted);margin-bottom:18px;line-height:1.7;}
.market-note strong{color:var(--accent2);font-weight:500;}

/* IVA TOGGLE */
.iva-strip{background:var(--surface2);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.iva-strip label{font-size:12px;color:var(--muted);}
.toggle-wrap{display:flex;gap:0;border:1px solid var(--border2);border-radius:7px;overflow:hidden;}
.toggle-btn{background:transparent;border:none;padding:5px 13px;font-size:11px;font-weight:700;font-family:var(--font-head);cursor:pointer;color:var(--muted);transition:all 0.15s;}
.toggle-btn.active{background:var(--accent);color:#000;}
.toggle-btn:hover:not(.active){color:var(--text);}
.iva-info{font-size:11px;color:var(--dim);padding:6px 12px;background:rgba(200,240,101,0.07);border-radius:6px;border:1px solid rgba(200,240,101,0.15);}

/* FC ROW */
.fc-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
.fc-row:last-child{border-bottom:none;}
.fc-name{flex:1;font-size:13px;color:var(--muted);}
.fc-name input{background:transparent;border:none;color:var(--muted);font-family:var(--font-body);font-size:13px;width:100%;outline:none;}
.fc-name input:focus{color:var(--text);}

/* TREASURY TABLE */
.treas-table{width:100%;border-collapse:collapse;font-size:12px;}
.treas-table th{text-align:right;color:var(--dim);font-size:10px;font-weight:500;letter-spacing:0.3px;padding:6px 8px 8px;border-bottom:1px solid var(--border);}
.treas-table th:first-child{text-align:left;}
.treas-table td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;}
.treas-table td:first-child{text-align:left;color:var(--muted);}
.treas-table tr.total-row td{font-family:var(--font-head);font-weight:700;font-size:13px;border-top:1px solid var(--border2);padding-top:10px;}
.treas-table tr.highlight td{background:rgba(200,240,101,0.05);}
.treas-table tr.warn-row td{color:var(--amber);}
.treas-table tr.danger-row td{color:var(--red);}
.pos{color:var(--accent);}
.neg{color:var(--red);}

/* SCALE CARDS */
.scale-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;text-align:center;}
.scale-card.active-scale{border-color:var(--accent);}
.scale-num{font-family:var(--font-head);font-size:32px;font-weight:800;color:var(--accent);line-height:1;}
.scale-label{font-size:11px;color:var(--muted);margin-bottom:12px;}
.scale-metric{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);}
.scale-metric:last-child{border-bottom:none;}
.scale-metric .lbl{color:var(--dim);}
.scale-metric .val{font-weight:600;}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="logo"><span class="logo-dot"></span> Ole Protein</div>
    <div class="tagline" id="hdr-tagline"></div>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div style="font-size:11px;color:var(--dim);">v3.0 · 2026</div>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showTab('escenarios',this)" id="tab-sc"></button>
  <button class="nav-tab" onclick="showTab('tesoreria',this)" id="tab-ts"></button>
  <button class="nav-tab" onclick="showTab('escala',this)" id="tab-ek"></button>
  <button class="nav-tab" onclick="showTab('leasing',this)" id="tab-le"></button>
  <button class="nav-tab" onclick="showTab('supuestos',this)" id="tab-su"></button>
</nav>

<!-- ═══ ESCENARIOS ═══ -->
<div class="page active" id="page-escenarios">
  <div class="hero-strip">
    <div>
      <div class="hero-title" id="hero-title"></div>
      <div class="hero-desc" id="hero-desc"></div>
      <div class="hero-badges">
        <span class="hbadge" id="badge-cap"></span>
        <span class="hbadge green" id="badge-iva-rate"></span>
        <span class="hbadge blue" id="badge-mode"></span>
      </div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:10px;color:var(--dim);margin-bottom:3px;" id="hero-cost-lbl"></div>
      <div style="font-family:var(--font-head);font-size:38px;font-weight:800;color:var(--accent);line-height:1;" id="hero-coste">—</div>
      <div style="font-size:10px;color:var(--dim);margin-top:3px;" id="hero-pct"></div>
    </div>
  </div>
  <div class="grid-3" style="margin-bottom:24px;" id="scenarioGrid"></div>
  <div class="chart-box">
    <div class="chart-title" id="chart-esc-title"></div>
    <div class="chart-wrap" style="height:240px;"><canvas id="chartEsc"></canvas></div>
  </div>
  <div class="section-gap"></div>
  <div class="section-label" id="be-section-lbl"></div>
  <div class="grid-4" style="margin-top:8px;">
    <div class="metric-card"><div class="metric-label" id="be-r-lbl"></div><div class="metric-value" style="color:var(--accent2);" id="be-r">—</div><div class="metric-sub" id="be-r-sub"></div></div>
    <div class="metric-card"><div class="metric-label" id="be-l-lbl"></div><div class="metric-value" style="color:var(--accent2);" id="be-l">—</div><div class="metric-sub" id="be-l-sub"></div></div>
    <div class="metric-card"><div class="metric-label" id="mc-lbl"></div><div class="metric-value" style="color:var(--muted);">250</div><div class="metric-sub" id="mc-sub"></div></div>
    <div class="metric-card"><div class="metric-label" id="rc-lbl"></div><div class="metric-value" style="color:var(--accent);" id="be-c">—</div><div class="metric-sub" id="rc-sub"></div></div>
  </div>
</div>

<!-- ═══ TESORERÍA ═══ -->
<div class="page" id="page-tesoreria">
  <div class="section-label" id="ts-section-lbl"></div>
  <div class="section-title" id="ts-section-title"></div>
  <div class="iva-strip">
    <div style="display:flex;align-items:center;gap:10px;">
      <label id="lbl-legal-form"></label>
      <div class="toggle-wrap">
        <button class="toggle-btn active" id="btn-autonomo" onclick="setLegalForm('autonomo',this)"></button>
        <button class="toggle-btn" id="btn-sl" onclick="setLegalForm('sl',this)"></button>
      </div>
    </div>
    <div class="iva-info" id="ts-iva-info"></div>
  </div>
  <div class="grid-3" style="margin-bottom:20px;">
    <div class="metric-card"><div class="metric-label" id="ts-m1"></div><div class="metric-value" style="color:var(--accent);" id="ts-v1">—</div><div class="metric-sub" id="ts-s1"></div></div>
    <div class="metric-card"><div class="metric-label" id="ts-m2"></div><div class="metric-value" id="ts-v2">—</div><div class="metric-sub" id="ts-s2"></div></div>
    <div class="metric-card"><div class="metric-label" id="ts-m3"></div><div class="metric-value" id="ts-v3">—</div><div class="metric-sub" id="ts-s3"></div></div>
  </div>
  <div class="chart-box">
    <div class="chart-title" id="ts-chart-title"></div>
    <div class="chart-wrap" style="height:260px;"><canvas id="chartTreasury"></canvas></div>
  </div>
  <div class="card" style="margin-top:16px;overflow-x:auto;">
    <h4 id="ts-table-title"></h4>
    <table class="treas-table" id="treasuryTable"></table>
  </div>
  <p class="note" id="ts-note"></p>
</div>

<!-- ═══ ESCALABILIDAD ═══ -->
<div class="page" id="page-escala">
  <div class="section-label" id="ek-section-lbl"></div>
  <div class="section-title" id="ek-section-title"></div>
  <div class="iva-strip">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <label id="lbl-mkt-budget" style="font-size:12px;color:var(--muted);"></label>
      <input class="cell-input free" type="text" inputmode="decimal" id="mktBudget" value="0" oninput="recalc()" style="width:90px;">
      <span style="font-size:11px;color:var(--dim);" id="lbl-mkt-per-machine"></span>
    </div>
    <div class="iva-info" id="ek-mkt-info"></div>
  </div>
  <div id="scaleGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;"></div>
  <div class="chart-box">
    <div class="chart-title" id="ek-chart-title"></div>
    <div class="chart-wrap" style="height:260px;"><canvas id="chartScale"></canvas></div>
  </div>
  <p class="note" id="ek-note"></p>
</div>

<!-- ═══ LEASING ═══ -->
<div class="page" id="page-leasing">
  <div class="section-label" id="fin-lbl"></div>
  <div class="section-title" id="fin-title"></div>
  <div class="grid-3" style="margin-bottom:20px;">
    <div class="fin-card">
      <div class="fin-name" id="fin-buy-name"></div>
      <div class="fin-price" style="color:var(--muted);">6.475€</div>
      <div class="fin-price-sub" id="fin-buy-sub"></div>
      <ul class="fin-list" id="fin-buy-list"></ul>
    </div>
    <div class="fin-card">
      <div class="fin-name" id="fin-lease-name"></div>
      <div style="font-size:10px;color:var(--dim);margin-bottom:3px;" id="fin-lease-mo"></div>
      <div class="fin-price" style="color:var(--blue);">117€/mes</div>
      <div class="fin-price-sub" id="fin-lease-sub"></div>
      <ul class="fin-list" id="fin-lease-list"></ul>
    </div>
    <div class="fin-card recommended">
      <div class="fin-badge" id="fin-rec-badge"></div>
      <div class="fin-name" id="fin-rent-name"></div>

/* ════ STATE ════ */
let lang='es', ivaMode='con', legalForm='autonomo';
const IVA_RATE=0.10; // 10% alimentación
const IVA_SOPORTADO_RATE=0.21; // IVA soportado en compras (renting, material)

let ingredients=[
  {cantidad:30,unidad:'g',precio:11.00},
  {cantidad:250,unidad:'ml',precio:0.001},
  {cantidad:1,unidad:'ud',precio:0.04},
];
let extraIngNames={es:[],en:[]};
let fixedCosts=[
  {nombre_es:'Cuota renting',nombre_en:'Renting fee',amount:136},
  {nombre_es:'Electricidad',nombre_en:'Electricity',amount:50},
  {nombre_es:'Mantenimiento',nombre_en:'Maintenance',amount:30},
];

let simChart=null,escChart=null,leasingChart=null,treasuryChart=null,scaleChart=null;
let chartsInit=false;

/* ════ HELPERS ════ */
const tr=()=>T[lang];
const fmt2=n=>tr().fmtNum(n);
const fmtK=n=>tr().fmtInt(n);
function set(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function setHTML(id,v){const e=document.getElementById(id);if(e)e.innerHTML=v;}
function buildList(id,items){setHTML(id,items.map(i=>`<li class="${i.p?'pro':''}">${i.t}</li>`).join(''));}

/* ════ IVA LOGIC ════ */
// pvpInput = what's entered in slider
// if ivaMode='con' → pvpInput includes IVA → net = pvpInput/1.10
// if ivaMode='sin' → pvpInput is already net
function netPvp(pvpInput){
  return ivaMode==='con' ? pvpInput/( 1+IVA_RATE) : pvpInput;
}
function ivaPorVaso(pvpInput){
  return ivaMode==='con' ? pvpInput-netPvp(pvpInput) : netPvp(pvpInput)*IVA_RATE;
}
// IVA soportado mensual (on fixed costs that have IVA: renting)
function ivaSupMensual(){
  return fixedCosts.reduce((s,f)=>{
    if(f.nombre_es==='Cuota renting'||f.nombre_en==='Renting fee') return s+f.amount*IVA_SOPORTADO_RATE;
    return s;
  },0);
}

/* ════ INGREDIENT & FC CALCS ════ */
function costeU(ing){
  if(ing.unidad==='ud') return ing.precio*ing.cantidad;
  const f=(ing.unidad==='g'||ing.unidad==='ml')?1000:1;
  return (ing.precio/f)*ing.cantidad;
}
function totalMP(){return ingredients.reduce((s,i)=>s+costeU(i),0);}
function totalFC(){return fixedCosts.reduce((s,f)=>s+f.amount,0);}

/* ════ INCOME TAX ════ */
function calcTax(beneficioAnual){
  if(legalForm==='sl') return Math.max(0,beneficioAnual*0.23);
  // Autónomo IRPF tramos 2024
  let tax=0, rem=beneficioAnual;
  const tramos=[[12450,0.19],[7763,0.24],[15000,0.30],[24166,0.37],[72607,0.45],[Infinity,0.47]];
  for(const [limit,rate] of tramos){
    if(rem<=0) break;
    const base=Math.min(rem,limit);
    tax+=base*rate; rem-=base;
  }
  return Math.max(0,tax);
}

/* ════ MAIN RECALC ════ */
function recalc(){
  const supActive=document.getElementById('page-supuestos').classList.contains('active');
  if(supActive){updateCostTotal();updateFCTotal();}

  const vasos=parseInt(document.getElementById('sliderVasos').value);
  const pvpInput=parseInt(document.getElementById('sliderPrecio').value)/100;
  const com=parseInt(document.getElementById('sliderComision').value)/100;
  const mp=totalMP(), fc=totalFC();
  const neto=netPvp(pvpInput);
  const ivaV=ivaPorVaso(pvpInput);
  const t=tr();

  if(supActive){
    document.getElementById('outVasos').textContent=vasos;
    document.getElementById('outPrecio').textContent=fmt2(pvpInput)+'€';
    document.getElementById('outComision').textContent=Math.round(com*100)+'%';
    // IVA explainer badge
    set('badge-mode',ivaMode==='con'?t.badgeModeConIva:t.badgeModeSinIva);
    set('iva-explainer',t.ivaExplainer(fmt2(pvpInput),fmt2(neto),fmt2(ivaV)));
  }

  set('badge-mode',ivaMode==='con'?t.badgeModeConIva:t.badgeModeSinIva);

  const ingM=vasos*30*neto, mpM=mp*vasos*30, comM=ingM*com;
  const ben=ingM-mpM-comM-fc;
  const mg=ingM>0?Math.round((ben/ingM)*100):0;
  const mu=neto-mp-neto*com;
  const beVal=mu>0?Math.ceil(fc/mu/30):999;
  // IVA neto trimestral
  const ivaRep=vasos*30*ivaV; // IVA mensual repercutido
  const ivaSup=ivaSupMensual(); // IVA soportado mensual
  const ivaNeto3=(ivaRep-ivaSup)*3; // trimestral

  if(supActive){
    set('calcIng',fmtK(ingM)+'€');
    set('calcMp','-'+fmtK(mpM)+'€');
    set('calcFc','-'+fmtK(fc)+'€');
    set('calcBen',fmtK(ben)+'€');
    set('calcAnio',fmtK(ben*12)+'€');
    set('calcMg',mg+'%');
    set('calcIvaQ',fmtK(ivaNeto3)+'€');
    set('calcBE',beVal<900?beVal+' '+t.beUnit:t.beInviable);
    const c=ben>0?'var(--accent)':'var(--red)';
    ['calcBen','calcAnio','calcMg'].forEach(id=>document.getElementById(id).style.color=c);
    const wb=document.getElementById('warnBox');
    if(ben<=0){wb.className='warn warn-red';wb.style.display='block';wb.textContent=t.warnUnprofitable;}
    else if(mg<20){wb.className='warn warn-amber';wb.style.display='block';wb.textContent=t.warnLowMargin;}
    else{wb.style.display='none';}
    if(chartsInit) refreshSimChart(mp,fc,vasos,com,neto);
  }

  updateScenarios(pvpInput,com);
  updateBreakeven(neto,mp,com,fc);
  if(chartsInit){
    updateTreasury(pvpInput,com,vasos);
    updateScale(pvpInput,com);
  }
}

function updateBreakeven(neto,mp,com,fc){
  const t=tr(), mu=neto-mp-neto*com;
  const bR=mu>0?Math.ceil(fc/mu/30):999;
  const fcLease=fixedCosts.reduce((s,f)=>(f.nombre_es==='Cuota renting'?s+117:s+f.amount),0);
  const bL=mu>0?Math.ceil(fcLease/mu/30):999;

  set('be-l',bL<900?bL+' '+t.beUnit:t.beInviable);

/* ════ TREASURY ════ */
function buildTreasuryData(pvpInput,com,vasos){
  const t=tr();
  const neto=netPvp(pvpInput), ivaV=ivaPorVaso(pvpInput);
  const mp=totalMP(), fc=totalFC();
  const ivaRep=vasos*30*ivaV;
  const ivaSup=ivaSupMensual();
  const benMes=vasos*30*neto - mp*vasos*30 - vasos*30*neto*com - fc;
  const taxAnual=calcTax(Math.max(0,benMes)*12);
  const taxMes=taxAnual/12;
  let cumul=0;
  return Array.from({length:12},(_,i)=>{
    const m=i+1;
    const ingBruto=vasos*30*(neto+ivaV);
    const gastos=mp*vasos*30 + vasos*30*neto*com + fc;
    const resultado=benMes;
    const ivaPayment=(m%3===0)?(ivaRep-ivaSup)*3:0;
    const taxPayment=taxMes; // monthly estimation
    const netoCaja=resultado - ivaPayment - taxPayment;
    cumul+=netoCaja;
    return {m,ingBruto,gastos,resultado,ivaPayment,taxPayment,netoCaja,cumul};
  });
}

function updateTreasury(pvpInput,com,vasos){
  const t=tr();
  const data=buildTreasuryData(pvpInput,com,vasos);
  // Chart
  if(treasuryChart){
    treasuryChart.data.labels=data.map(d=>t.monthNames[d.m-1]);
    treasuryChart.data.datasets[0].data=data.map(d=>Math.round(d.cumul));
    treasuryChart.data.datasets[1].data=data.map(d=>Math.round(d.netoCaja));
    treasuryChart.update('none');
  }
  // Table
  const tbl=document.getElementById('treasuryTable');
  tbl.innerHTML=`<tr>${t.tsTblCols.map((c,i)=>`<th${i>0?' style="text-align:right"':''}>${c}</th>`).join('')}</tr>`;
  data.forEach(d=>{
    const isQ=d.m%3===0;

    tbl.innerHTML+=`<tr class="${cls}">
      <td>${t.monthNames[d.m-1]}</td>
      <td>${fmtK(d.ingBruto)}€</td>
      <td style="color:var(--red)">-${fmtK(d.gastos)}€</td>

      <td class="${d.cumul>=0?'pos':'neg'}" style="font-weight:600">${fmtK(d.cumul)}€</td>
    </tr>`;
  });
  const totalCumul=data[11].cumul;
  set('ts-v3',fmtK(totalCumul)+'€');
  document.getElementById('ts-v3').style.color=totalCumul>=0?'var(--accent)':'var(--red)';
}

function updateScale(pvpInput,com){
  const t=tr();

  const mp=totalMP(), fc=totalFC();

  const grid=document.getElementById('scaleGrid');
  grid.innerHTML='';
  const annualBens=[];

  machines.forEach(n=>{
    const mktPerMachine=mkt/n;
    const fcTotal=fc*n + mktPerMachine*n; // fc per machine × n + total marketing
    const benMes=vasos*30*neto*n - mp*vasos*30*n - vasos*30*neto*com*n - fc*n - mkt;
    const benAnual=benMes*12;
    const taxAnual=calcTax(Math.max(0,benAnual));
    const benPostTax=benAnual-taxAnual;
    const mg=vasos*30*neto*n>0?Math.round((benMes/(vasos*30*neto*n))*100):0;

      <div class="scale-metric"><span class="lbl">Post-tax/año</span><span class="val" style="color:${benPostTax>=0?'var(--accent)':'var(--red)'}">${fmtK(benPostTax)}€</span></div>
      <div class="scale-metric"><span class="lbl">${t.rowMg}</span><span class="val">${mg}%</span></div>

    grid.appendChild(card);
  });

  if(scaleChart){

    scaleChart.data.datasets[0].backgroundColor=annualBens.map(b=>b>=0?'#c8f065':'#f06565');

    type:'bar',
    data:{labels:prices.map(p=>(lang==='es'?p.toFixed(2).replace('.',','):p.toFixed(2))+'€'),datasets:[{data:bens,backgroundColor:bens.map(b=>b>=0?'#c8f065':'#f06565'),borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:t.simSubtitle(vasos,fmt2(mp)),font:{size:11},color:'#666'}},scales:{y:{ticks:{callback:v=>fmtK(v)+'€',color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},x:{ticks:{color:'#666',font:{size:11},autoSkip:false},grid:{display:false},border:{color:'transparent'}}}}
  });
}

function rebuildChartLabels(){
  const t=tr();
  if(escChart){escChart.data.labels=[t.scNames[0],t.scNames[1],t.scNames[2]];escChart.update('none');}
  if(leasingChart){leasingChart.data.labels=t.leasingLabels;leasingChart.update('none');}
  const vasos=parseInt(document.getElementById('sliderVasos').value);
  const pvpInput=parseInt(document.getElementById('sliderPrecio').value)/100;
  const com=parseInt(document.getElementById('sliderComision').value)/100;
  if(treasuryChart){
    treasuryChart.data.labels=t.monthNames;
    treasuryChart.update('none');
  }
  refreshSimChart(totalMP(),totalFC(),vasos,com,netPvp(pvpInput));
  updateTreasury(pvpInput,com,vasos);
  updateScale(pvpInput,com);
}

function initCharts(){
  if(chartsInit)return; chartsInit=true;
  const t=tr(), co={responsive:true,maintainAspectRatio:false};
  const pvpInput=parseInt(document.getElementById('sliderPrecio').value)/100;
  const com=parseInt(document.getElementById('sliderComision').value)/100;
  const vasos=parseInt(document.getElementById('sliderVasos').value);
  const mp=totalMP(),fc=totalFC();
  const bP=scBen(t.scVasos[0],t.scPvp[0],com);
  const bN=scBen(t.scVasos[1],t.scPvp[1],com);
  const bO=scBen(t.scVasos[2],t.scPvp[2],com);

  escChart=new Chart(document.getElementById('chartEsc'),{
    type:'bar',
    data:{labels:[t.scNames[0],t.scNames[1],t.scNames[2]],datasets:[{data:[bP*12,bN*12,bO*12],backgroundColor:['#f06565','#658ff0','#c8f065'],borderRadius:6}]},
    options:{...co,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fmtK(v)+'€',color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},x:{ticks:{color:'#888',font:{size:12}},grid:{display:false},border:{color:'transparent'}}}}
  });

  const tData=buildTreasuryData(pvpInput,com,vasos);
  treasuryChart=new Chart(document.getElementById('chartTreasury'),{
    type:'line',
    data:{
      labels:t.monthNames,
      datasets:[
        {label:lang==='es'?'Caja acumulada':'Cumulative cash',data:tData.map(d=>Math.round(d.cumul)),borderColor:'#c8f065',backgroundColor:'rgba(200,240,101,0.08)',tension:0.4,fill:true,pointRadius:4},
        {label:lang==='es'?'Caja mensual neta':'Monthly net cash',data:tData.map(d=>Math.round(d.netoCaja)),borderColor:'#65d4f0',backgroundColor:'transparent',tension:0.4,pointRadius:3},
      ]
    },
    options:{...co,plugins:{legend:{display:true,labels:{color:'#666',font:{size:11},boxWidth:10}}},scales:{y:{ticks:{callback:v=>fmtK(v)+'€',color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},x:{ticks:{color:'#666',font:{size:11}},grid:{display:false},border:{color:'transparent'}}}}
  });

  const machines=[1,2,3,5,10];
  const mkt=parseFloat(document.getElementById('mktBudget').value)||0;
  const annualBens=machines.map(n=>{
    const ben=vasos*30*netPvp(pvpInput)*n - mp*vasos*30*n - vasos*30*netPvp(pvpInput)*com*n - fc*n - mkt;
    return Math.round(ben*12);
  });
  scaleChart=new Chart(document.getElementById('chartScale'),{
    type:'bar',
    data:{labels:machines.map(n=>t.scaleLabels(n)),datasets:[{data:annualBens,backgroundColor:annualBens.map(b=>b>=0?'#c8f065':'#f06565'),borderRadius:6}]},
    options:{...co,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fmtK(v)+'€',color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},x:{ticks:{color:'#888',font:{size:12}},grid:{display:false},border:{color:'transparent'}}}}
  });

  leasingChart=new Chart(document.getElementById('chartLeasing'),{
    type:'bar',
    data:{labels:t.leasingLabels,datasets:[{data:[7834,8424,8160],backgroundColor:['#555','#658ff0','#c8f065'],borderRadius:6}]},
    options:{...co,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtK(ctx.raw)+'€'}}},scales:{y:{min:7000,ticks:{callback:v=>fmtK(v)+'€',color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},x:{ticks:{color:'#888',font:{size:12}},grid:{display:false},border:{color:'transparent'}}}}
  });

  refreshSimChart(mp,fc,vasos,com,netPvp(pvpInput));
  updateTreasury(pvpInput,com,vasos);
  updateScale(pvpInput,com);
}

/* ════ TAB NAV ════ */
function showTab(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(tb=>tb.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(!chartsInit) setTimeout(initCharts,60);
  if(id==='supuestos') setTimeout(()=>{renderIng();renderFC();recalc();},30);
  else recalc();
}

/* ════ BOOT ════ */
applyT(); renderIng(); renderFC(); recalc();
setTimeout(initCharts,80);
</script>
</body>
</html>
